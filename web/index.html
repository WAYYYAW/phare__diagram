<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>简单相图工具</title>
    <script src="https://cdn.plot.ly/plotly-2.32.0.min.js"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="app-header">
        <h1>相图分析工具</h1>
        <div class="app-header-actions">
            <a
            class="onther-link"
            href="https://mse.upc.edu.cn"
            target="_blank"
            rel="noopener noreferrer"
            >
                <span>材料科学与工程学院</span>
            </a>
            <span class="wasm-status" id="wasmStatus">WASM 加载中...</span>
            <a
                class="onther-link"
                href="https://github.com/WAYYYAW/phare__diagram"
                target="_blank"
                rel="noopener noreferrer"
                aria-label="打开 GitHub 开源地址"
            >
                <svg viewBox="0 0 16 16" aria-hidden="true">
                    <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8a8 8 0 0 0 5.47 7.59c.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.5-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82a7.65 7.65 0 0 1 4 0c1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8 8 0 0 0 16 8c0-4.42-3.58-8-8-8Z"/>
                </svg>
                <span>Github</span>
            </a>
        </div>
    </div>

    <div class="nav-bar">
        <button class="nav-btn active" data-page="binary" onclick="switchPage('binary')">二元相图</button>
        <button class="nav-btn" data-page="ternary" onclick="switchPage('ternary')">三元相图</button>
        <button class="nav-btn" data-page="triangle" onclick="switchPage('triangle')">浓度三角</button>
    </div>

    <!-- Binary Page -->
    <div class="page active" id="page-binary">
        <div class="sidebar-layout binary-layout">
            <div class="main-content">
                <section class="binary-visual-panel">
                    <div class="binary-chart-frame">
                        <div class="chart-container" id="binaryChart"></div>
                        <button type="button" id="binaryCalcOverlay" class="binary-calc-overlay" aria-label="点击相图进行杠杆计算"></button>
                    </div>
                    <div id="binaryLegend" class="binary-legend" aria-label="二元相图图例"></div>
                </section>
                <div id="binaryResult"></div>
            </div>
            <div class="sidebar" id="binarySidebar"></div>
        </div>
    </div>

    <!-- Ternary Page -->
    <div class="page" id="page-ternary">
        <div class="ternary-shell">
            <div class="ternary-stage">
                <section class="ternary-chart-panel ternary-chart-panel-3d">
                    <div class="ternary-chart-header">
                        <div>
                            <h2>三维相图</h2>
                            <p>旋转查看曲面、边界线与等温面关系</p>
                        </div>
                    </div>
                    <div class="ternary-3d-stage">
                        <div class="chart-container" id="ternaryChart3d"></div>
                        <div id="ternaryIsoControl" class="ternary-iso-dock"></div>
                    </div>
                </section>
                <section class="ternary-chart-panel ternary-chart-panel-2d">
                    <div class="ternary-chart-header">
                        <div>
                            <h2>二维投影</h2>
                            <p>快速观察等温截线与相区填色</p>
                        </div>
                    </div>
                    <div class="chart-container" id="ternaryChart2d"></div>
                </section>
            </div>
            <aside id="ternaryToolbar" class="ternary-sidebar"></aside>
        </div>
    </div>

    <!-- Triangle Page -->
    <div class="page" id="page-triangle">
        <div id="triangleContainer"></div>
    </div>

    <div class="page-disclaimer">本页面可能会采集设备信息</div>

    <script>
        window.__XUBEN_ANALYTICS_ENDPOINT__ = 'http://127.0.0.1:7999/analytics';
    </script>
    <script src="js/analytics.js"></script>
    <script src="js/bridge.js"></script>
    <script src="js/app.js"></script>
    <script src="js/binary.js"></script>
    <script src="js/ternary.js"></script>
    <script src="js/triangle.js"></script>
    <script src="js/wasm_exec.js"></script>
    <script>
        const go = new Go();
        WebAssembly.instantiateStreaming(fetch('main.wasm'), go.importObject)
            .then(result => {
                window.__go = go;
                window.__wasmInst = result.instance; // for zero-copy TypedArray views
                go.run(result.instance);
            })
            .catch(err => {
                document.getElementById('wasmStatus').textContent = 'WASM 加载失败，请更新你的浏览器';
                console.error('WASM load error:', err);
            });
    </script>
</body>
</html>
